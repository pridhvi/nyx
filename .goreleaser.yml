version: 2

project_name: nyx

before:
  hooks:
    - sh -c "cd web && npm ci && npm run build"

builds:
  - id: nyx
    main: .
    binary: nyx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/pridhvi/nyx/cmd/nyx.version={{ .Version }}

archives:
  - id: nyx
    ids:
      - nyx
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - CHANGELOG.md
      - docs/deployment.md
      - docs/nyx-project-spec.md
      - docs/implementation-plan.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
