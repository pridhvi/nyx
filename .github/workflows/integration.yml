name: Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

jobs:
  fixture-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26.4"

      - name: Install integration dependencies
        run: sudo apt-get update && sudo apt-get install -y sqlite3 curl

      - name: Run fixture integration smoke
        run: NYX_RUN_INTEGRATION=1 make test-integration

      - name: Upload integration artifacts on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: nyx-integration-artifacts
          path: |
            /tmp/nyx-integration-*.log
            /tmp/nyx-integration-*.md
            /tmp/nyx-integration-*.sarif
          if-no-files-found: ignore
