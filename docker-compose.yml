services:
  nox:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - nox-data:/home/nox/.nox
    environment:
      - NOX_LLM_BASE_URL=http://ollama:11434/v1
      - NOX_LLM_MODEL=llama3:8b
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  nox-data:
  ollama-data:
