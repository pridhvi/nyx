services:
  nyx:
    build: .
    ports:
      - "127.0.0.1:6767:6767"
    volumes:
      - nyx-data:/home/nyx/.nyx
    environment:
      - NYX_LLM_BASE_URL=http://ollama:11434/v1
      - NYX_LLM_MODEL=llama3:8b
      - NYX_API_KEY=${NYX_API_KEY:?set NYX_API_KEY before running docker compose}
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H \"X-Nyx-API-Key: $$NYX_API_KEY\" http://127.0.0.1:6767/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  nyx-data:
  ollama-data:
